services:
  - type: web
    name: crm-backend
    env: node
    plan: free
    rootDir: backend
    healthCheckPath: /health
    buildCommand: npm install && npm run build
    startCommand: npx prisma migrate deploy && npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: crm-db
          property: connectionString

databases:
  - name: crm-db
    plan: free
    databaseName: crm_db
    user: crm_user
